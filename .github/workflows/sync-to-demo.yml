name: Sync Theme Updates to Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout demo branch
        uses: actions/checkout@v4
        with:
          ref: demo

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Sync from main branch
        run: |
          # Fetch the main branch
          git fetch origin main

          # Remove tracked files that only exist in demo.
          # Keep the demo post directory intact so the preview site can stay content-rich.
          while read -r file; do
            if [[ -n "$file" ]]; then
              git rm -f --ignore-unmatch "$file"
            fi
          done < <(
            comm -23 \
              <(git ls-tree -r --name-only HEAD | sort) \
              <(git ls-tree -r --name-only origin/main | sort) \
              | grep -v '^src/content/posts/' || true
          )

          # Overwrite the entire working directory with the content from the main branch
          git checkout origin/main -- .

          # Restore the demo-specific content that should not be overwritten
          git restore --source=HEAD --staged --worktree src/content/posts
          # git restore src/config.ts # Uncomment this line if you also have a demo-specific config

      - name: Commit and push changes
        id: sync
        run: |
          # Check if there are any changes to commit
          if [[ -z $(git status -s) ]]; then
            echo "No theme changes to sync."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git add .
            git commit -m "chore: Sync theme updates from main"
            git push origin demo
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger demo deployment
        if: steps.sync.outputs.pushed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          curl -L \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-demo.yml/dispatches" \
            -d '{"ref":"demo"}'
