name: Sync Theme Updates to Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main_branch

      - name: Checkout demo branch
        uses: actions/checkout@v4
        with:
          ref: demo

      - name: Configure Git
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Smart Sync main to demo
        run: |
          # Copy all theme files from main_branch, overwriting existing files
          # Exclude the .git directory and the specific files/directories we want to preserve in demo
          rsync -av --delete --exclude='.git' --exclude='src/content/posts' --exclude='src/config.ts' main_branch/ .

      - name: Commit and push changes
        run: |
          if [[ -z $(git status -s) ]]; then
            echo "No theme changes to sync."
          else
            git add .
            git commit -m "chore: Sync theme updates from main"
            git push origin demo
          fi
